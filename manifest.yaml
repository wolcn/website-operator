            type: object
          status:
            description: status defines the observed state of Website
            properties:
              deploymentStatus:
                description: DeploymentStatus reflects the status of the created Deployment.
                properties:
                  availableReplicas:
                    description: Total number of available non-terminating pods (ready
                      for at least minReadySeconds) targeted by this deployment.
                    format: int32
                    type: integer
                  collisionCount:
                    description: |-
                      Count of hash collisions for the Deployment. The Deployment controller uses this
                      field as a collision avoidance mechanism when it needs to create the name for the
                      newest ReplicaSet.
                    format: int32
                    type: integer
                  conditions:
                    description: Represents the latest available observations of a
                      deployment's current state.
                    items:
                      description: DeploymentCondition describes the state of a deployment
